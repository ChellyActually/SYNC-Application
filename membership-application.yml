name: 🚀 Club Membership Application
description: Apply to join the coding club!
title: "[Application]: "
labels: ["application", "pending"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ### Welcome to the Club Selection Process!
        Please fill out this form accurately. Your application will be reviewed by the core committee.
  
  - type: input
    id: name
    attributes:
      label: Full Name
      placeholder: e.g., Ashwin Raj
    validations:
      required: true

  - type: dropdown
    id: year
    attributes:
      label: Current Academic Year
      options:
        - 1st Year
        - 2nd Year
        - 3rd Year
        - 4th Year
    validations:
      required: true

  - type: checkboxes
    id: languages
    attributes:
      label: Programming Languages You Are Comfortable With
      description: Select all that apply.
      options:
        - C / C++
        - Python
        - JavaScript / TypeScript
        - Dart / Flutter
        - Java
        - Web Dev (HTML/CSS)
        - Other (Mention below)

  - type: textarea
    id: experience
    attributes:
      label: Past Projects or Coding Experience
      placeholder: Tell us about things you've built, hackathons you've attended, or your current learning goals.
    validations:
      required: true

  - type: input
    id: portfolio
    attributes:
      label: Portfolio or Personal Website Link
      placeholder: https://...
    validations:
      required: false

  - type: checkboxes
    id: code-of-conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to collaborate respectfully and actively participate in club hackathons and projects.
          required: true
